<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>负鼠表情包生成器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<script src="https://cdn.bootcdn.net/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#111118;--surface:#1a1a28;--surface2:#222236;
  --text:#e8e8f0;--text2:#8888a0;--accent:#6366f1;
  --accent-h:#818cf8;--border:#2a2a40;--radius:12px;--radius-sm:8px;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;
  overflow-x:hidden;-webkit-tap-highlight-color:transparent;
}
.app{max-width:940px;margin:0 auto;padding:12px 16px 40px}
.app-header{text-align:center;padding:16px 0 12px}
.app-header h1{font-size:21px;font-weight:700;letter-spacing:-.3px}
.app-header p{font-size:13px;color:var(--text2);margin-top:3px}
.main{display:flex;gap:16px;align-items:flex-start}
.canvas-wrap{flex:1;min-width:0;max-width:440px}
.canvas-box{
  position:relative;width:100%;aspect-ratio:1/1;
  background:var(--surface);border-radius:var(--radius);
  overflow:hidden;cursor:grab;touch-action:none;
  border:1px solid var(--border);
}
.canvas-box.dragging{cursor:grabbing}
.canvas-box canvas{width:100%;height:100%;display:block}
.canvas-hint{
  position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
  font-size:11px;color:var(--text2);background:rgba(0,0,0,.6);
  padding:3px 10px;border-radius:20px;pointer-events:none;
  transition:opacity .4s;white-space:nowrap;
}
.canvas-hint.hide{opacity:0}
.panel{flex:1;min-width:0;display:flex;flex-direction:column;gap:10px}
.card{background:var(--surface);border-radius:var(--radius);padding:14px}
.card-title{
  font-size:11px;font-weight:600;color:var(--text2);
  margin-bottom:10px;text-transform:uppercase;letter-spacing:.6px;
}
.text-input{
  width:100%;background:var(--surface2);border:1.5px solid var(--border);
  border-radius:var(--radius-sm);padding:10px 12px;font-size:15px;
  color:var(--text);outline:none;transition:border-color .2s;
  font-family:inherit;
}
.text-input:focus{border-color:var(--accent)}
.presets{display:flex;flex-wrap:wrap;gap:6px}
.preset-btn{
  padding:5px 13px;background:var(--surface2);border:1px solid var(--border);
  border-radius:20px;font-size:13px;color:var(--text);cursor:pointer;
  transition:all .15s;white-space:nowrap;font-family:inherit;
}
.preset-btn:hover,.preset-btn.on{
  background:var(--accent);border-color:var(--accent);color:#fff;
}
.slider-row{display:flex;align-items:center;gap:10px}
.slider-row input[type=range]{
  flex:1;-webkit-appearance:none;appearance:none;height:4px;
  background:var(--surface2);border-radius:2px;outline:none;
}
.slider-row input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:18px;height:18px;background:var(--accent);
  border-radius:50%;cursor:pointer;transition:transform .12s;
}
.slider-row input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.15)}
.slider-row input[type=range]::-moz-range-thumb{
  width:18px;height:18px;background:var(--accent);border:none;
  border-radius:50%;cursor:pointer;
}
.slider-val{
  min-width:36px;text-align:center;font-size:12px;color:var(--text2);
  background:var(--surface2);padding:3px 4px;border-radius:var(--radius-sm);
  font-variant-numeric:tabular-nums;
}
.color-row{display:flex;align-items:center;gap:10px}
.color-row label{font-size:13px;color:var(--text2);min-width:30px}
.color-row input[type=color]{
  -webkit-appearance:none;appearance:none;width:34px;height:34px;
  border:2px solid var(--border);border-radius:var(--radius-sm);
  cursor:pointer;background:none;padding:2px;
}
.color-row input[type=color]::-webkit-color-swatch-wrapper{padding:0}
.color-row input[type=color]::-webkit-color-swatch{border:none;border-radius:4px}
.color-row input[type=color]::-moz-color-swatch{border:none;border-radius:4px}
.font-row{display:flex;gap:6px}
.font-btn{
  flex:1;padding:7px;background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius-sm);font-size:13px;color:var(--text);
  cursor:pointer;transition:all .15s;font-family:inherit;text-align:center;
}
.font-btn:hover,.font-btn.on{background:var(--accent);border-color:var(--accent);color:#fff}
.actions{display:flex;gap:10px;margin-top:6px}
.btn{
  flex:1;padding:13px 16px;border:none;border-radius:var(--radius);
  font-size:15px;font-weight:600;cursor:pointer;transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:6px;
  font-family:inherit;
}
.btn:active{transform:scale(.97)}
.btn-save{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.btn-save:hover{background:var(--surface2)}
.btn-share{background:var(--accent);color:#fff}
.btn-share:hover{background:var(--accent-h)}
/* Modal */
.modal-bg{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);
  z-index:100;align-items:center;justify-content:center;padding:20px;
}
.modal-bg.show{display:flex}
.modal-card{
  background:var(--surface);border-radius:16px;padding:24px;
  max-width:360px;width:100%;text-align:center;position:relative;
}
.modal-card h3{font-size:17px;margin-bottom:6px}
.modal-card .sub{font-size:13px;color:var(--text2);margin-bottom:18px;line-height:1.5}
.qr-box{
  display:inline-flex;padding:14px;background:#fff;border-radius:12px;
  margin-bottom:14px;
}
.qr-box canvas,.qr-box img{display:block}
.modal-tip{font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:16px}
.modal-close{
  padding:10px 32px;background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius-sm);font-size:14px;color:var(--text);
  cursor:pointer;font-family:inherit;transition:all .15s;
}
.modal-close:hover{background:var(--border)}
.mobile-only{display:none}
/* Toast */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--accent);color:#fff;padding:10px 22px;border-radius:24px;
  font-size:14px;font-weight:500;transition:transform .3s ease;z-index:200;
  pointer-events:none;white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0)}
/* Mobile */
@media(max-width:680px){
  .app{padding:6px 10px 32px}
  .app-header{padding:10px 0 6px}
  .app-header h1{font-size:18px}
  .main{flex-direction:column;gap:10px}
  .canvas-wrap{max-width:100%}
  .panel{width:100%}
  .mobile-only{display:flex}
  .card{padding:12px}
  .btn{padding:14px}
  .actions{flex-direction:column}
}
</style>
</head>
<body>
<div class="app">
  <header class="app-header">
    <h1>🦝 负鼠表情包生成器</h1>
    <p>输入文案，自由编辑，一键生成专属表情包</p>
  </header>
  <div class="main">
    <div class="canvas-wrap">
      <div class="canvas-box" id="canvasBox">
        <canvas id="canvas"></canvas>
        <div class="canvas-hint" id="hint">拖动文字调整位置 · 双指旋转缩放</div>
      </div>
    </div>
    <div class="panel">
      <div class="card">
        <div class="card-title">💬 表情文案</div>
        <input class="text-input" id="textInput" placeholder="输入你的表情包文案..." maxlength="30">
        <div class="presets" id="presets"></div>
      </div>
      <div class="card">
        <div class="card-title">🔤 字体</div>
        <div class="font-row" id="fontRow"></div>
      </div>
      <div class="card">
        <div class="card-title">🎨 样式调整</div>
        <div style="display:flex;flex-direction:column;gap:12px">
          <div>
            <div style="font-size:12px;color:var(--text2);margin-bottom:6px">字号大小</div>
            <div class="slider-row">
              <input type="range" id="fontSize" min="20" max="120" value="52">
              <span class="slider-val" id="fontSizeVal">52</span>
            </div>
          </div>
          <div>
            <div style="font-size:12px;color:var(--text2);margin-bottom:6px">描边粗细</div>
            <div class="slider-row">
              <input type="range" id="strokeW" min="0" max="16" value="5" step="0.5">
              <span class="slider-val" id="strokeWVal">5</span>
            </div>
          </div>
          <div>
            <div style="font-size:12px;color:var(--text2);margin-bottom:6px">旋转角度</div>
            <div class="slider-row">
              <input type="range" id="rotation" min="-180" max="180" value="0">
              <span class="slider-val" id="rotationVal">0°</span>
            </div>
          </div>
          <div>
            <div style="font-size:12px;color:var(--text2);margin-bottom:6px">文字缩放</div>
            <div class="slider-row">
              <input type="range" id="scaleRange" min="0.3" max="3" value="1" step="0.05">
              <span class="slider-val" id="scaleVal">1.0x</span>
            </div>
          </div>
          <div class="color-row">
            <label>文字</label>
            <input type="color" id="fillColor" value="#ffffff">
            <label style="margin-left:8px">描边</label>
            <input type="color" id="strokeColor" value="#000000">
          </div>
        </div>
      </div>
      <div class="actions">
        <button class="btn btn-save" id="btnSave">💾 保存图片</button>
        <button class="btn btn-share" id="btnShare">📲 微信分享</button>
      </div>
    </div>
  </div>
</div>
<!-- Share modal -->
<div class="modal-bg" id="shareModal">
  <div class="modal-card">
    <h3 id="modalTitle">微信分享</h3>
    <p class="sub" id="modalSub">扫描二维码，发送给微信好友</p>
    <div class="qr-box" id="qrBox"></div>
    <p class="modal-tip" id="modalTip">
      1. 打开手机微信扫一扫上方二维码<br>
      2. 长按图片保存<br>
      3. 在微信中发送给朋友
    </p>
    <button class="mobile-only btn" id="btnSaveMobile" style="margin-bottom:10px;width:100%">
      💾 保存图片到相册
    </button>
    <button class="modal-close" id="modalClose">关闭</button>
  </div>
</div>
<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
/* ======================================================
   STATE
   ====================================================== */
const S = {
  text: '',
  textX: 0.5,   // fraction of canvas width
  textY: 0.78,  // fraction of canvas height
  rotation: 0,  // degrees
  scale: 1,
  fontSize: 52,
  strokeWidth: 5,
  fillColor: '#ffffff',
  strokeColor: '#000000',
  fontWeight: 'bold',
  fontFamily: "'ZCOOL KuaiLe', 'PingFang SC', sans-serif",
};
const CANVAS_SIZE = 800; // logical pixels
const DPR = 2;
const PRESETS = [
  '摆烂','不想上班','好的收到','收到','啊对对对',
  '摸鱼中','不想努力了','躺平','真香','笑死',
  '无语','好耶','6','emo了','开摆',
  '下班！','干饭','不想说话','已读不回','晚安'
];
const FONTS = [
  { label: '可爱', weight: 'bold', family: "'ZCOOL KuaiLe', 'PingFang SC', sans-serif" },
  { label: '黑体', weight: 'normal', family: "'PingFang SC', 'Microsoft YaHei', sans-serif" },
  { label: '粗体', weight: '900', family: "'PingFang SC', 'Microsoft YaHei', sans-serif" },
];

let canvas, ctx, baseImg, imageLoaded = false;
let isDragging = false, isRotating = false, isScaling = false;
let dragStartX = 0, dragStartY = 0, dragStartTX = 0, dragStartTY = 0;
let pinchStartAngle = 0, pinchStartRotation = 0;
let pinchStartDist = 0, pinchStartScale = 1;
let hintTimer = null;

/* ======================================================
   INIT
   ====================================================== */
function init() {
  canvas = document.getElementById('canvas');
  ctx = canvas.getContext('2d');
  canvas.width = CANVAS_SIZE * DPR;
  canvas.height = CANVAS_SIZE * DPR;
  canvas.style.width = '100%';
  canvas.style.height = '100%';

  loadBaseImage();
  buildPresets();
  buildFonts();
  bindControls();
  bindCanvasEvents();
  bindActionButtons();
  bindModal();
  render();

  // Re-render after web fonts load (so text metrics match the actual font)
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(() => render());
  }

  // hide hint after 4s
  hintTimer = setTimeout(() => {
    document.getElementById('hint').classList.add('hide');
  }, 4000);
}

  baseImg = new Image();
  baseImg.crossOrigin = 'anonymous';
  baseImg.onload = () => { imageLoaded = true; render(); };

/* ======================================================
   RENDERING
   ====================================================== */
function render() {
  const w = CANVAS_SIZE, h = CANVAS_SIZE;
  ctx.save();
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.clearRect(0, 0, w, h);

  // Draw base image (cover)
  if (imageLoaded && baseImg.naturalWidth > 0) {
    const ir = baseImg.naturalWidth / baseImg.naturalHeight;
    const cr = w / h;
    let sx, sy, sw, sh;
    if (ir > cr) {
      sh = baseImg.naturalHeight;
      sw = sh * cr;
      sx = (baseImg.naturalWidth - sw) / 2;
      sy = 0;
    } else {
      sw = baseImg.naturalWidth;
      sh = sw / cr;
      sx = 0;
      sy = (baseImg.naturalHeight - sh) / 2;
    }
    ctx.drawImage(baseImg, sx, sy, sw, sh, 0, 0, w, h);
  } else {
    // placeholder
    ctx.fillStyle = '#1a1a28';
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = '#444';
    ctx.font = '28px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('图片加载中...', w/2, h/2);
  }

  // Draw text overlay
  if (S.text) {
    drawText(ctx, w, h, false);
  }
  ctx.restore();
}

function drawText(c, w, h, isExport) {
  const px = S.textX * w;
  const py = S.textY * h;
  const rad = S.rotation * Math.PI / 180;
  const fs = S.fontSize * S.scale;

  c.save();
  c.translate(px, py);
  c.rotate(rad);

  if (!isExport) c.scale(S.scale, S.scale);

  c.font = `${S.fontWeight} ${isExport ? fs : S.fontSize}px ${S.fontFamily}`;
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.lineJoin = 'round';
  c.miterLimit = 2;

  // stroke
  if (S.strokeWidth > 0) {
    c.strokeStyle = S.strokeColor;
    c.lineWidth = isExport ? S.strokeWidth * S.scale * 2 : S.strokeWidth * 2;
    c.strokeText(S.text, 0, 0);
  }
  // fill
  c.fillStyle = S.fillColor;
  c.fillText(S.text, 0, 0);

  // draw handles (editor only)
  if (!isExport) {
    drawHandles(c, w, h);
  }

  c.restore();
}

function drawHandles(c, w, h) {
  const fs = S.fontSize;
  c.font = `${S.fontWeight} ${fs}px ${S.fontFamily}`;
  const tw = c.measureText(S.text).width;
  const th = fs * 1.3;
  const pad = 12;

  // bounding box
  c.strokeStyle = 'rgba(99,102,241,0.6)';
  c.lineWidth = 1.5 / S.scale;
  c.setLineDash([6 / S.scale, 4 / S.scale]);
  c.strokeRect(-tw/2 - pad, -th/2 - pad, tw + pad*2, th + pad*2);
  c.setLineDash([]);

  // corner dots
  const dotR = 4 / S.scale;
  c.fillStyle = 'rgba(99,102,241,0.8)';
  const corners = [
    [-tw/2 - pad, -th/2 - pad],
    [ tw/2 + pad, -th/2 - pad],
    [-tw/2 - pad,  th/2 + pad],
    [ tw/2 + pad,  th/2 + pad],
  ];
  corners.forEach(([cx, cy]) => {
    c.beginPath();
    c.arc(cx, cy, dotR, 0, Math.PI * 2);
    c.fill();
  });

  // rotation handle (above center)
  const handleY = -th/2 - pad - 20 / S.scale;
  c.strokeStyle = 'rgba(99,102,241,0.5)';
  c.lineWidth = 1 / S.scale;
  c.beginPath();
  c.moveTo(0, -th/2 - pad);
  c.lineTo(0, handleY + 6/S.scale);
  c.stroke();

  c.fillStyle = '#6366f1';
  c.beginPath();
  c.arc(0, handleY, 6 / S.scale, 0, Math.PI * 2);
  c.fill();
  c.strokeStyle = '#fff';
  c.lineWidth = 1.5 / S.scale;
  c.stroke();
}

/* ======================================================
   HIT TESTING
   ====================================================== */
function getTextBounds() {
  const fs = S.fontSize;
  ctx.font = `${S.fontWeight} ${fs}px ${S.fontFamily}`;
  const tw = ctx.measureText(S.text || '文').width;
  const th = fs * 1.3;
  const pad = 16;
  return { hw: (tw + pad*2) / 2, hh: (th + pad*2) / 2 };
}

function screenToLocal(mx, my) {
  const px = S.textX * CANVAS_SIZE;
  const py = S.textY * CANVAS_SIZE;
  const rad = -S.rotation * Math.PI / 180;
  const dx = mx - px, dy = my - py;
  const rx = dx * Math.cos(rad) - dy * Math.sin(rad);
  const ry = dx * Math.sin(rad) + dy * Math.cos(rad);
  return { x: rx / S.scale, y: ry / S.scale };
}

function screenToCanvas(clientX, clientY) {
  const r = canvas.getBoundingClientRect();
  return {
    x: (clientX - r.left) / r.width * CANVAS_SIZE,
    y: (clientY - r.top) / r.height * CANVAS_SIZE,
  };
}

function isRotationHandle(mx, my) {
  if (!S.text) return false;
  const px = S.textX * CANVAS_SIZE;
  const py = S.textY * CANVAS_SIZE;
  const b = getTextBounds();
  const handleDist = b.hh + 24;
  const rad = S.rotation * Math.PI / 180;
  const hx = px + handleDist * Math.sin(rad) * S.scale;
  const hy = py - handleDist * Math.cos(rad) * S.scale;
  const dist = Math.sqrt((mx - hx)**2 + (my - hy)**2);
  return dist < 20;
}

function hitTest(mx, my) {
  if (!S.text) return false;
  const local = screenToLocal(mx, my);
  const b = getTextBounds();
  return Math.abs(local.x) < b.hw && Math.abs(local.y) < b.hh;
}

/* ======================================================
   CANVAS EVENTS (Mouse)
   ====================================================== */
function bindCanvasEvents() {
  const box = document.getElementById('canvasBox');

  // Mouse
  box.addEventListener('mousedown', onMouseDown);
  window.addEventListener('mousemove', onMouseMove);
  window.addEventListener('mouseup', onMouseUp);

  // Touch
  box.addEventListener('touchstart', onTouchStart, { passive: false });
  window.addEventListener('touchmove', onTouchMove, { passive: false });
  window.addEventListener('touchend', onTouchEnd);

  // Wheel for scale
  box.addEventListener('wheel', onWheel, { passive: false });
}

function onMouseDown(e) {
  e.preventDefault();
  hideHint();
  const p = screenToCanvas(e.clientX, e.clientY);

  if (isRotationHandle(p.x, p.y)) {
    isRotating = true;
  } else if (hitTest(p.x, p.y)) {
    isDragging = true;
    dragStartX = p.x; dragStartY = p.y;
    dragStartTX = S.textX; dragStartTY = S.textY;
    document.getElementById('canvasBox').classList.add('dragging');
  }
}

function onMouseMove(e) {
  if (!isDragging && !isRotating) return;
  const p = screenToCanvas(e.clientX, e.clientY);

  if (isDragging) {
    S.textX = Math.max(0.05, Math.min(0.95, dragStartTX + (p.x - dragStartX) / CANVAS_SIZE));
    S.textY = Math.max(0.05, Math.min(0.95, dragStartTY + (p.y - dragStartY) / CANVAS_SIZE));
    render();
  }
  if (isRotating) {
    const px = S.textX * CANVAS_SIZE, py = S.textY * CANVAS_SIZE;
    const angle = Math.atan2(p.x - px, -(p.y - py)) * 180 / Math.PI;
    S.rotation = Math.round(angle);
    syncRotationSlider();
    render();
  }
}

function onMouseUp() {
  isDragging = false; isRotating = false;
  document.getElementById('canvasBox').classList.remove('dragging');
}

/* ======================================================
   CANVAS EVENTS (Touch)
   ====================================================== */
function onTouchStart(e) {
  e.preventDefault();
  hideHint();
  if (e.touches.length === 1) {
    const t = e.touches[0];
    const p = screenToCanvas(t.clientX, t.clientY);
    if (isRotationHandle(p.x, p.y)) {
      isRotating = true;
    } else if (hitTest(p.x, p.y)) {
      isDragging = true;
      dragStartX = p.x; dragStartY = p.y;
      dragStartTX = S.textX; dragStartTY = S.textY;
    }
  } else if (e.touches.length === 2) {
    isDragging = false; isRotating = false;
    const [a, b] = [e.touches[0], e.touches[1]];
    pinchStartAngle = Math.atan2(b.clientX - a.clientX, -(b.clientY - a.clientY)) * 180 / Math.PI;
    pinchStartRotation = S.rotation;
    pinchStartDist = Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
    pinchStartScale = S.scale;
    isScaling = true;
  }
}

function onTouchMove(e) {
  e.preventDefault();
  if (e.touches.length === 1 && (isDragging || isRotating)) {
    const t = e.touches[0];
    const p = screenToCanvas(t.clientX, t.clientY);
    if (isDragging) {
      S.textX = Math.max(0.05, Math.min(0.95, dragStartTX + (p.x - dragStartX) / CANVAS_SIZE));
      S.textY = Math.max(0.05, Math.min(0.95, dragStartTY + (p.y - dragStartY) / CANVAS_SIZE));
      render();
    }
    if (isRotating) {
      const px = S.textX * CANVAS_SIZE, py = S.textY * CANVAS_SIZE;
      const angle = Math.atan2(p.x - px, -(p.y - py)) * 180 / Math.PI;
      S.rotation = Math.round(angle);
      syncRotationSlider();
      render();
    }
  } else if (e.touches.length === 2 && isScaling) {
    const [a, b] = [e.touches[0], e.touches[1]];
    // Scale
    const dist = Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
    S.scale = Math.max(0.3, Math.min(3, pinchStartScale * (dist / pinchStartDist)));
    syncScaleSlider();
    // Rotation
    const angle = Math.atan2(b.clientX - a.clientX, -(b.clientY - a.clientY)) * 180 / Math.PI;
    S.rotation = Math.round(pinchStartRotation + (angle - pinchStartAngle));
    if (S.rotation > 180) S.rotation -= 360;
    if (S.rotation < -180) S.rotation += 360;
    syncRotationSlider();
    render();
  }
}

function onTouchEnd(e) {
  if (e.touches.length === 0) {
    isDragging = false; isRotating = false; isScaling = false;
  } else if (e.touches.length === 1) {
    isScaling = false;
    // re-check for rotation handle or drag
    const t = e.touches[0];
    const p = screenToCanvas(t.clientX, t.clientY);
    if (isRotationHandle(p.x, p.y)) {
      isRotating = true;
    } else if (hitTest(p.x, p.y)) {
      isDragging = true;
      dragStartX = p.x; dragStartY = p.y;
      dragStartTX = S.textX; dragStartTY = S.textY;
    }
  }
}

function onWheel(e) {
  e.preventDefault();
  const delta = e.deltaY > 0 ? -0.05 : 0.05;
  S.scale = Math.max(0.3, Math.min(3, S.scale + delta));
  syncScaleSlider();
  render();
}

/* ======================================================
   UI CONTROLS
   ====================================================== */
function buildPresets() {
  const wrap = document.getElementById('presets');
  wrap.style.marginTop = '8px';
  PRESETS.forEach(text => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn';
    btn.textContent = text;
    btn.addEventListener('click', () => {
      S.text = text;
      document.getElementById('textInput').value = text;
      // highlight
      wrap.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      render();
    });
    wrap.appendChild(btn);
  });
}

function buildFonts() {
  const wrap = document.getElementById('fontRow');
  FONTS.forEach((f, i) => {
    const btn = document.createElement('button');
    btn.className = 'font-btn' + (i === 0 ? ' on' : '');
    btn.textContent = f.label;
    btn.addEventListener('click', () => {
      S.fontFamily = f.family;
      S.fontWeight = f.weight;
      wrap.querySelectorAll('.font-btn').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      render();
    });
    wrap.appendChild(btn);
  });
}

function bindControls() {
  const textInput = document.getElementById('textInput');
  textInput.addEventListener('input', () => {
    S.text = textInput.value;
    // clear preset highlight
    document.querySelectorAll('#presets .preset-btn').forEach(b => b.classList.remove('on'));
    render();
  });

  // Sliders
  bindSlider('fontSize', 'fontSizeVal', v => { S.fontSize = +v; }, v => v);
  bindSlider('strokeW', 'strokeWVal', v => { S.strokeWidth = +v; }, v => v);
  bindSlider('rotation', 'rotationVal', v => { S.rotation = +v; }, v => v + '°');
  bindSlider('scaleRange', 'scaleVal', v => { S.scale = +v; }, v => (+v).toFixed(1) + 'x');

  // Colors
  document.getElementById('fillColor').addEventListener('input', e => {
    S.fillColor = e.target.value; render();
  });
  document.getElementById('strokeColor').addEventListener('input', e => {
    S.strokeColor = e.target.value; render();
  });
}

function bindSlider(sliderId, valId, setter, formatter) {
  const slider = document.getElementById(sliderId);
  const valEl = document.getElementById(valId);
  slider.addEventListener('input', () => {
    setter(slider.value);
    valEl.textContent = formatter(slider.value);
    render();
  });
}

function syncRotationSlider() {
  document.getElementById('rotation').value = S.rotation;
  document.getElementById('rotationVal').textContent = S.rotation + '°';
}
function syncScaleSlider() {
  document.getElementById('scaleRange').value = S.scale;
  document.getElementById('scaleVal').textContent = S.scale.toFixed(1) + 'x';
}

/* ======================================================
   ACTIONS: SAVE & SHARE
   ====================================================== */
function bindActionButtons() {
  document.getElementById('btnSave').addEventListener('click', saveImage);
  document.getElementById('btnShare').addEventListener('click', openShareModal);
  document.getElementById('btnSaveMobile')?.addEventListener('click', () => {
    saveImage();
    closeShareModal();
  });
}

function exportCanvas() {
  const ec = document.createElement('canvas');
  ec.width = CANVAS_SIZE * DPR;
  ec.height = CANVAS_SIZE * DPR;
  const ectx = ec.getContext('2d');
  ectx.setTransform(DPR, 0, 0, DPR, 0, 0);

  // draw base image
  if (imageLoaded && baseImg.naturalWidth > 0) {
    const w = CANVAS_SIZE, h = CANVAS_SIZE;
    const ir = baseImg.naturalWidth / baseImg.naturalHeight;
    const cr = w / h;
    let sx, sy, sw, sh;
    if (ir > cr) {
      sh = baseImg.naturalHeight; sw = sh * cr;
      sx = (baseImg.naturalWidth - sw) / 2; sy = 0;
    } else {
      sw = baseImg.naturalWidth; sh = sw / cr;
      sx = 0; sy = (baseImg.naturalHeight - sh) / 2;
    }
    ectx.drawImage(baseImg, sx, sy, sw, sh, 0, 0, w, h);
  }

  // draw text (export mode)
  if (S.text) {
    const px = S.textX * CANVAS_SIZE;
    const py = S.textY * CANVAS_SIZE;
    const rad = S.rotation * Math.PI / 180;
    const fs = S.fontSize * S.scale;

    ectx.save();
    ectx.translate(px, py);
    ectx.rotate(rad);
    ectx.font = `${S.fontWeight} ${fs}px ${S.fontFamily}`;
    ectx.textAlign = 'center';
    ectx.textBaseline = 'middle';
    ectx.lineJoin = 'round';
    ectx.miterLimit = 2;

    if (S.strokeWidth > 0) {
      ectx.strokeStyle = S.strokeColor;
      ectx.lineWidth = S.strokeWidth * S.scale * 2;
      ectx.strokeText(S.text, 0, 0);
    }
    ectx.fillStyle = S.fillColor;
    ectx.fillText(S.text, 0, 0);
    ectx.restore();
  }
  return ec;
}

function saveImage() {
  const ec = exportCanvas();
  const url = ec.toDataURL('image/png');
  const a = document.createElement('a');
  a.download = `负鼠表情包_${Date.now()}.png`;
  a.href = url;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  showToast('图片已保存！');
}

async function openShareModal() {
  const modal = document.getElementById('shareModal');
  const qrBox = document.getElementById('qrBox');
  const titleEl = document.getElementById('modalTitle');
  const subEl = document.getElementById('modalSub');
  const tipEl = document.getElementById('modalTip');
  const saveMobileBtn = document.getElementById('btnSaveMobile');
  const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

  // Show loading state
  titleEl.textContent = '正在上传表情包...';
  subEl.textContent = '请稍候';
  tipEl.innerHTML = '';
  qrBox.innerHTML = '<div style="padding:30px;color:#888;font-size:14px">⏳ 上传中...</div>';
  qrBox.style.display = 'inline-flex';
  saveMobileBtn.style.display = 'none';
  modal.classList.add('show');

  // Upload the image
  let imageUrl = null;
  try {
    imageUrl = await uploadImage();
  } catch(e) {
    console.error('Upload failed:', e);
  }

  if (!imageUrl) {
    // Fallback: use page URL
    titleEl.textContent = '手机扫码分享';
    subEl.textContent = '用微信扫码打开页面，保存图片后发送给好友';
    tipEl.innerHTML = '1. 打开手机微信扫一扫二维码<br>2. 在页面中保存图片<br>3. 在微信聊天中添加为表情';
    qrBox.innerHTML = '';
    if (typeof QRCode !== 'undefined') {
      new QRCode(qrBox, { text: window.location.href, width: 160, height: 160, colorDark: '#1a1a28', colorLight: '#ffffff' });
    }
    return;
  }

  // Success: QR code points directly to the sticker image
  if (isMobile) {
    titleEl.textContent = '分享到微信';
    subEl.textContent = '长按下方图片保存，然后在微信中发送';
    tipEl.innerHTML =
      '1. 长按上方图片保存到手机相册<br>2. 打开微信，进入聊天<br>3. 点击表情面板 → "+" → 添加图片<br>4. 选择保存的图片作为表情';
    saveMobileBtn.style.display = 'flex';
  } else {
    titleEl.textContent = '手机扫码获取表情包';
    subEl.textContent = '用微信扫码，长按图片即可保存';
    tipEl.innerHTML =
      '1. 打开手机微信扫一扫二维码<br>2. 直接看到表情包图片<br>3. 长按图片保存，发送给好友';
    saveMobileBtn.style.display = 'none';
  }

  qrBox.innerHTML = '';
  if (typeof QRCode !== 'undefined') {
    try {
      new QRCode(qrBox, {
        text: imageUrl,
        width: 160, height: 160,
        colorDark: '#1a1a28', colorLight: '#ffffff',
      });
    } catch(e) {
      qrBox.innerHTML = '<p style="color:#888;font-size:13px;padding:20px">二维码生成失败</p>';
    }
  } else {
    qrBox.innerHTML = `<a href="${imageUrl}" target="_blank" style="color:var(--accent)">点击打开表情包图片</a>`;
  }
}

async function uploadImage() {
  const ec = exportCanvas();
  const blob = await new Promise(r => ec.toBlob(r, 'image/png'));

  // Primary: Telegraph (CORS enabled, WeChat-friendly)
  try {
    const fd = new FormData();
    fd.append('file', blob, 'sticker.png');
    const resp = await fetch('https://telegra.ph/upload', { method: 'POST', body: fd });
    if (resp.ok) {
      const data = await resp.json();
      if (data && data[0] && data[0].path) {
        return 'https://telegra.ph' + data[0].path;
      }
    }
  } catch(e) { console.warn('Telegraph upload failed:', e); }

  // Fallback: 0x0.st
  try {
    const fd = new FormData();
    fd.append('file', blob, 'sticker.png');
    const resp = await fetch('https://0x0.st', { method: 'POST', body: fd });
    if (resp.ok) {
      const url = (await resp.text()).trim();
      if (url.startsWith('http')) return url;
    }
  } catch(e) { console.warn('0x0.st upload failed:', e); }

  return null;
}

function closeShareModal() {
  document.getElementById('shareModal').classList.remove('show');
}

function bindModal() {
  document.getElementById('modalClose').addEventListener('click', closeShareModal);
  document.getElementById('shareModal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeShareModal();
  });
}

/* ======================================================
   UTILS
   ====================================================== */
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

function hideHint() {
  const h = document.getElementById('hint');
  if (h) h.classList.add('hide');
  if (hintTimer) clearTimeout(hintTimer);
}

   START
   ====================================================== */
document.addEventListener('DOMContentLoaded', init);

// WeChat browser: replace share button behavior entirely
window.addEventListener('load', () => {
  const inWeChat = /MicroMessenger/i.test(navigator.userAgent);
  if (inWeChat) {
    const btn = document.getElementById('btnShare');
    btn.textContent = '📲 发送给朋友';
    // Clone to remove ALL previous event listeners, then bind new one
    const newBtn = btn.cloneNode(true);
    btn.parentNode.replaceChild(newBtn, btn);
    newBtn.addEventListener('click', () => {
      // Show fullscreen image overlay for long-press saving
      showFullscreenImage();
    });
  }
});

function showFullscreenImage() {
  // Remove existing overlay if any
  const old = document.getElementById('imgOverlay');
  if (old) old.remove();

  const ec = exportCanvas();
  const dataUrl = ec.toDataURL('image/png');

  const overlay = document.createElement('div');
  overlay.id = 'imgOverlay';
  overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px';
  overlay.innerHTML = `
    <img src="${dataUrl}" style="max-width:90%;max-height:70vh;border-radius:8px" />
    <p style="color:#aaa;font-size:14px;margin-top:16px;text-align:center;line-height:1.6">
      长按图片保存，然后在微信聊天中发送<br>
      <span style="color:#666;font-size:12px">点击空白处关闭</span>
    </p>
  `;
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.remove();
  });
  document.body.appendChild(overlay);
}
